{% extends 'base.html' %}
{% block content %}
<section class="hero-section">
    <div class="container text-center">
        <p class="hero-kicker" data-aos="fade-down"><i class="ri-chat-1-line"></i> Support en direct</p>
        <h1 data-aos="fade-up">Chat avec nos experts</h1>
        <p class="lead" data-aos="fade-up" data-aos-delay="100">Discutez en temps réel avec notre équipe.</p>
    </div>
</section>

<section class="section-shell">
    <div class="container">
        <div class="row g-4 h-100">
            <div class="col-lg-12">
                <div class="chat-layout"
                     data-current-user-id="{{ current_user_id }}"
                     data-csrf-token="{{ csrf_token }}"
                     data-api-base="{{ api_base }}"
                     data-ws-url="{{ ws_url }}"
                     data-ws-token="{{ ws_token }}">

                    <div class="chat-container card reveal">
                        <div class="chat-header card-header">
                            <h5 class="mb-0" id="chatHeader">Conversation avec le support</h5>
                        </div>

                        <div class="chat-messages card-body" id="chatMessages">
                            <p class="text-muted small mb-0 text-center">Chargement des messages...</p>
                        </div>

                        <div class="card-footer">
                            <form class="chat-form" id="chatForm">
                                <div class="input-group">
                                    <input class="form-control"
                                           id="chatMessageInput"
                                           placeholder="Votre message..."
                                           disabled
                                           autocomplete="off">
                                    <button class="btn btn-primary"
                                            id="chatSendButton"
                                            type="submit"
                                            disabled>
                                        <i class="ri-send-plane-line"></i> Envoyer
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
.chat-layout {
    height: calc(100vh - 300px);
    display: flex;
    align-items: center;
    justify-content: center;
}

.chat-container {
    height: 500px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    border-radius: 12px;
}

.chat-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    padding: 20px;
}

.chat-header h5 {
    font-weight: 600;
    margin: 0;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    background: #f9fafb;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.chat-bubble {
    display: flex;
    flex-direction: column;
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 12px;
    word-wrap: break-word;
    animation: slideIn 0.3s ease-out;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.chat-bubble.self {
    align-self: flex-end;
    background: #667eea;
    color: white;
    border-bottom-right-radius: 4px;
}

.chat-bubble.other {
    align-self: flex-start;
    background: white;
    color: #1f2937;
    border: 1px solid #e5e7eb;
    border-bottom-left-radius: 4px;
}

.chat-meta {
    font-size: 0.75rem;
    opacity: 0.7;
    margin-top: 6px;
    display: block;
}

.chat-bubble.self .chat-meta {
    opacity: 0.8;
    color: rgba(255, 255, 255, 0.8);
}

.chat-form {
    padding: 20px;
    background: white;
    border-top: 1px solid #e5e7eb;
}

.chat-form .input-group {
    gap: 10px;
}

.chat-form input:disabled {
    background-color: #f3f4f6;
    cursor: not-allowed;
}

.chat-form button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

@media (max-width: 768px) {
    .chat-layout {
        height: auto;
    }

    .chat-container {
        height: 400px;
    }

    .chat-bubble {
        max-width: 90%;
    }
}
</style>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/client-chat.js') }}"></script>
{% endblock %}
